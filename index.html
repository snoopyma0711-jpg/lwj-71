<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜市摊位换位调度台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1>🌙 夜市摊位换位调度台</h1>
                <div class="header-time" id="currentTime"></div>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" id="btnNewApplication">➕ 发起换位申请</button>
                <button class="btn btn-warning" id="btnUndoSwap" disabled>↩️ 撤销上一笔换位</button>
                <button class="btn btn-ghost" id="btnResetData">🔄 重置数据</button>
            </div>
        </header>

        <main class="main-content">
            <section class="section section-stalls">
                <div class="section-header">
                    <h2>🏪 摊位状态一览（12个）</h2>
                    <div class="filter-bar">
                        <select id="filterCategory">
                            <option value="">全部品类</option>
                            <option value="小吃">小吃类</option>
                            <option value="饮品">饮品类</option>
                            <option value="烧烤">烧烤类</option>
                            <option value="服饰">服饰类</option>
                            <option value="饰品">饰品类</option>
                            <option value="游戏">游戏类</option>
                        </select>
                        <select id="filterPower">
                            <option value="">全部用电</option>
                            <option value="低">低功耗</option>
                            <option value="中">中功耗</option>
                            <option value="高">高功耗</option>
                        </select>
                        <select id="filterPopularity">
                            <option value="">全部人气</option>
                            <option value="3">⭐⭐⭐ 及以上</option>
                            <option value="4">⭐⭐⭐⭐ 及以上</option>
                            <option value="5">⭐⭐⭐⭐⭐</option>
                        </select>
                    </div>
                </div>
                <div class="stalls-grid" id="stallsGrid"></div>
            </section>

            <div class="side-panels">
                <section class="section section-queue">
                    <div class="section-header">
                        <h2>📋 正在排队换位</h2>
                        <span class="badge badge-info" id="queueCount">0</span>
                    </div>
                    <div class="queue-list" id="queueList"></div>
                </section>

                <section class="section section-history">
                    <div class="section-header">
                        <h2>📜 换位历史记录</h2>
                        <div class="merchant-filter">
                            <select id="filterMerchant">
                                <option value="">全部商户</option>
                            </select>
                        </div>
                    </div>
                    <div class="history-list" id="historyList"></div>
                </section>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="applicationModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>📝 发起换位申请</h3>
                <button class="modal-close" data-close="applicationModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>发起商户 <span class="required">*</span></label>
                    <select id="appMerchant"></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前摊位</label>
                        <input type="text" id="appCurrentStall" disabled>
                    </div>
                    <div class="form-group">
                        <label>优先级 <span class="required">*</span></label>
                        <select id="appPriority">
                            <option value="1">普通</option>
                            <option value="2">较急</option>
                            <option value="3">紧急</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>想换去的方向 <span class="required">*</span></label>
                    <select id="appTargetDirection">
                        <option value="">请选择目标方向...</option>
                        <option value="A区-入口">A区（入口侧，人流量大）</option>
                        <option value="B区-中间">B区（中间地带，客流稳定）</option>
                        <option value="C区-角落">C区（角落，适合安静品类）</option>
                        <option value="D区-出口">D区（出口侧，回头客多）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标摊位（可选，不选则系统推荐）</label>
                    <select id="appTargetStall">
                        <option value="">自动推荐同方向空闲/可协商摊位</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>换位原因 <span class="required">*</span></label>
                    <textarea id="appReason" rows="3" placeholder="例如：当前摊位排水不好，想换到离水源近的地方..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-close="applicationModal">取消</button>
                <button class="btn btn-primary" id="btnSubmitApplication">提交申请</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="negotiationModal" style="display:none;">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>🤝 换位协商窗口</h3>
                <button class="modal-close" data-close="negotiationModal">✕</button>
            </div>
            <div class="negotiation-timer-bar">
                <div class="timer-info">
                    <span class="timer-label">剩余时间</span>
                    <span class="timer-value" id="negoTimer">01:30</span>
                </div>
                <div class="timer-progress">
                    <div class="timer-progress-bar" id="negoProgressBar"></div>
                </div>
                <div class="timer-meta">
                    <span class="extension-badge" id="negoExtensionBadge">原始窗口</span>
                    <span class="status-badge" id="negoStepBadge">等待对方回应</span>
                </div>
            </div>
            <div class="modal-body">
                <div class="negotiation-swap-visual">
                    <div class="stall-card-big" id="negoStallA">
                        <div class="stall-role">申请方</div>
                        <div class="stall-name" id="negoStallAName"></div>
                        <div class="stall-merchant" id="negoMerchantA"></div>
                        <div class="stall-meta-row">
                            <span id="negoPopA"></span>
                            <span id="negoCatA"></span>
                        </div>
                    </div>
                    <div class="swap-arrow">⇄</div>
                    <div class="stall-card-big" id="negoStallB">
                        <div class="stall-role stall-role-target">被申请方</div>
                        <div class="stall-name" id="negoStallBName"></div>
                        <div class="stall-merchant" id="negoMerchantB"></div>
                        <div class="stall-meta-row">
                            <span id="negoPopB"></span>
                            <span id="negoCatB"></span>
                        </div>
                    </div>
                </div>
                <div class="negotiation-details">
                    <div class="detail-row">
                        <span class="detail-label">申请商户：</span>
                        <span id="negoApplicant"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">被申请商户：</span>
                        <span id="negoTarget"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">优先级：</span>
                        <span id="negoPriority"></span>
                    </div>
                    <div class="detail-row detail-reason">
                        <span class="detail-label">换位原因：</span>
                        <span id="negoReason"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">申请时间：</span>
                        <span id="negoApplyTime"></span>
                    </div>
                </div>
                <div class="negotiation-actions">
                    <div class="action-hint" id="negoActionHint">请当前摊主做出选择</div>
                    <div class="action-buttons">
                        <button class="btn btn-success" id="btnNegoAccept">✅ 同意换位</button>
                        <button class="btn btn-danger" id="btnNegoReject">❌ 拒绝换位</button>
                        <button class="btn btn-ghost" id="btnNegoWait">⏳ 暂时不处理</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="merchantHistoryModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="merchantHistoryTitle">商户换位历史</h3>
                <button class="modal-close" data-close="merchantHistoryModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="merchant-profile" id="merchantProfile"></div>
                <div class="merchant-history-list" id="merchantHistoryList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-close="merchantHistoryModal">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal" style="display:none;">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="confirmTitle">确认操作</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btnConfirmCancel">取消</button>
                <button class="btn btn-primary" id="btnConfirmOk">确定</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
